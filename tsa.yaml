# TSA Server: ConfigMap + Deployment + Service.
# Fetches its own time-stamping certificate from the CA, so it needs IM_CA_URL.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tsa-config
data:
  IM_DB_HOST: "mysql"
  IM_DB_PORT: "3306"
  IM_DB_USER: "root"
  IM_DB_PASS: "root"
  IM_CA_URL: "http://ca:9001"
  TSA_DB_NAME: "tsa_db"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsa
  labels: { app: tsa }
spec:
  replicas: 1
  selector: { matchLabels: { app: tsa } }
  template:
    metadata: { labels: { app: tsa } }
    spec:
      containers:
        - name: tsa
          image: msahique/tsa_server_2026:v1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: tsa-config }
          ports: [{ containerPort: 9002 }]
          readinessProbe:
            httpGet: { path: /openapi.json, port: 9002 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tsa
spec:
  selector: { app: tsa }
  ports: [{ port: 9002, targetPort: 9002 }]
